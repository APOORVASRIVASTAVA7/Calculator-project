<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- {% comment %} hsl(28 100% 54%) button colour {% endcomment %}
    {% comment %} hsl(0 0% 20%) {% endcomment %} number buttons
    hsl(0 0% 26%) operator buttons -->

    <div class="wrapper">
        <div class="phone">
            <div class="calculator">

                <div class="display answer-screen">0</div>

                <div class="buttons">

                    <button class="btn gray" data-clear="true">AC</button>
                    <button class="btn gray" data-delete="true">DEL</button>
                    <button class="btn gray" data-operator="%">%</button>
                    <button class="btn orange" data-operator="/">÷</button>

                    <button class="btn dark" data-number="7">7</button>
                    <button class="btn dark" data-number="8">8</button>
                    <button class="btn dark" data-number="9">9</button>
                    <button class="btn orange" data-operator="*">×</button>


                    <button class="btn dark" data-number="4">4</button>
                    <button class="btn dark" data-number="5">5</button>
                    <button class="btn dark" data-number="6">6</button>
                    <button class="btn orange" data-operator="-">-</button>

                    <button class="btn dark" data-number="1">1</button>
                    <button class="btn dark" data-number="2">2</button>
                    <button class="btn dark" data-number="3">3</button>
                    <button class="btn orange" data-operator="+">+</button>

                    <button class="btn dark zero" data-number="0">0</button>
                    <button class="btn dark" data-number=".">.</button>
                    <button class="btn orange" data-equals="true">=</button>

                </div>

            </div>
        </div>
    </div>







    <script src="script.js"> </script>
</body>

</html>
